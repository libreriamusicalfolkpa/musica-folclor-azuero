<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ficha del Autor</title>
  <style>
    body { font-family: Arial; margin: 40px; background: #fff; }
    img { width: 200px; height: 200px; border-radius: 10px; object-fit: cover; }
    .obra { margin-bottom: 15px; }
  </style>
</head>
<body>
  <a href="index.html">← Volver</a>
  <div id="contenido"></div>

  <script>
    const urlParams = new URLSearchParams(window.location.search);
    const nombreAutor = urlParams.get("nombre");

    fetch("autores.json")
      .then(res => res.json())
      .then(data => {
        const autor = data.find(a => a.nombre === nombreAutor);
        if (!autor) {
          document.getElementById("contenido").innerHTML = "<p>Autor no encontrado.</p>";
          return;
        }

        let html = `
          <h1>${autor.nombre}</h1>
          <img src="${autor.imagen}" alt="${autor.nombre}">
          <p>${autor.biografia}</p>
          <h2>Obras</h2>
        `;

        autor.obras.forEach(obra => {
          html += `
            <div class="obra">
              <strong>${obra.titulo}</strong> (${obra.genero})<br>
              <a href="${obra.pdf}" target="_blank">Ver partitura</a>
            </div>
          `;
        });

        document.getElementById("contenido").innerHTML = html;
      })
      .catch(err => console.error("Error al cargar autor:", err));
  </script>
</body>
</html>
